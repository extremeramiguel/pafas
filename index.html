<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronometraje</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cronos">

    <style>
        :root {
            --bg-color: #111;
            --accent-color: #2ecc71;
            --text-color: #fff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding-top: env(safe-area-inset-top);
            user-select: none;
        }
        h2 { margin-top: 20px; }
        button {
            font-size: 22px;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 12px;
            border: none;
            background: #444;
            color: white;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px;
            padding: 10px;
        }
        .dorsal {
            border: 4px solid var(--accent-color);
            box-sizing: border-box;
            color: white;
            font-weight: bold;
            font-size: 32px;
            padding: 25px 10px;
            border-radius: 15px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
            transition: background 0.2s ease;
        }
        .hidden { display: none !important; }
        #timer {
            font-size: 65px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin: 30px 0;
            color: var(--accent-color);
        }
        input {
            font-size: 22px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #222;
            color: white;
            width: 80%;
            margin-bottom: 10px;
        }
        table { width: 95%; margin: auto; border-collapse: collapse; font-size: 18px; }
        th { background: #333; padding: 12px; border: 1px solid #555; }
        td { padding: 12px; border: 1px solid #555; }
        .btn-main { background: #3498db; width: 85%; font-weight: bold; }
        .btn-success { background: #2ecc71; width: 85%; font-weight: bold; }
        .btn-danger { background: #e74c3c; }

        /* Estilos específicos para la pantalla de Login */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }
        .login-title {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-title">PAFAS 2026</div>
    <input id="codigoInput" type="password" placeholder="Introduce el código" inputmode="numeric" style="text-align: center;" onkeyup="if(event.key === 'Enter') checkCode()">
    <button class="btn-main" onclick="checkCode()">Acceder</button>
</div>

<h2 id="header" class="hidden">Nueva Tanda</h2>

<div id="setup" class="hidden">
    <input id="entryTanda" type="number" placeholder="Nº de Tanda" inputmode="numeric">
    <input id="entryLaps" type="number" placeholder="Nº de Vueltas" inputmode="numeric" value="5">
    <br>
    <button class="btn-main" onclick="confirmTanda()">Confirmar Tanda</button>
</div>

<div id="dorsalSetup" class="hidden">
    <input id="dorsalInput" placeholder="Añadir (Ej: 1, 4, 12)" type="text" onkeyup="if(event.key === 'Enter') addDorsal()">
    <div style="display: flex; justify-content: center;">
        <button onclick="addDorsal()">Añadir</button>
        <button class="btn-danger" onclick="removeLastDorsal()">Borrar último</button>
    </div>
    <div id="list" style="margin: 20px; white-space: pre-wrap; font-size: 18px; color: #aaa;"></div>
    <button class="btn-main" onclick="startRace()">INICIAR SALIDA</button>
</div>

<div id="race" class="hidden">
    <div id="timer">00:00</div>
    <div id="grid" class="grid"></div>
    <div style="margin-top: 20px;">
        <button onclick="undo()">DESHACER</button>
        <button class="btn-danger" onclick="finishRace()">CERRAR TANDA</button>
    </div>
</div>

<div id="results" class="hidden">
    <h3 id="resultHeader"></h3>
    <table>
        <thead>
            <tr>
                <th>Posición</th>
                <th>Dorsal</th>
                <th>Tiempo</th>
            </tr>
        </thead>
        <tbody id="resultTable"></tbody>
    </table>
    <br>
    <button class="btn-main" onclick="sendEmail()">ENVIAR POR EMAIL</button>
    <button class="btn-success" onclick="downloadCSV()">DESCARGAR EXCEL</button>
    <button onclick="newTanda()" style="width: 85%;">Nueva tanda</button>
</div>

<script>
// --- VARIABLES DE ESTADO ---
let dorsals = []; 
let activeRunners = []; 
let results = [];
let historyRace = []; 
let setupHistory = []; 
let startTime;
let interval;
let tanda = null;
let totalLaps = 5; 
let currentScreen = "setup"; 
let screenToGo = "setup"; // Variable auxiliar para saber a qué pantalla ir tras el login

// --- SISTEMA DE GUARDADO (LOCALSTORAGE) ---
function saveData() {
    const state = {
        tanda, totalLaps, currentScreen, dorsals, activeRunners, 
        results, historyRace, setupHistory, startTime
    };
    localStorage.setItem('cronosData', JSON.stringify(state));
}

function loadData() {
    const saved = localStorage.getItem('cronosData');
    if (saved) {
        const state = JSON.parse(saved);
        tanda = state.tanda;
        totalLaps = state.totalLaps || 5; 
        screenToGo = state.currentScreen || "setup";
        dorsals = state.dorsals;
        activeRunners = state.activeRunners;
        results = state.results;
        historyRace = state.historyRace;
        setupHistory = state.setupHistory;
        startTime = state.startTime;
    }

    // Ocultar todas las pantallas de la app por defecto
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("dorsalSetup").classList.add("hidden");
    document.getElementById("race").classList.add("hidden");
    document.getElementById("results").classList.add("hidden");
    document.getElementById("header").classList.add("hidden");

    // Comprobar si ya puso la contraseña en esta pestaña
    if (sessionStorage.getItem('auth') === 'true') {
        document.getElementById("loginScreen").classList.add("hidden");
        unlockApp();
    } else {
        document.getElementById("loginScreen").classList.remove("hidden");
    }
}

window.onload = loadData;

// --- SISTEMA DE ACCESO ---
function checkCode() {
    const input = document.getElementById("codigoInput").value;
    if (input === "250326") {
        sessionStorage.setItem('auth', 'true'); // Guardar sesión temporal
        document.getElementById("loginScreen").classList.add("hidden");
        unlockApp();
    } else {
        alert("Código incorrecto");
        document.getElementById("codigoInput").value = "";
    }
}

function unlockApp() {
    document.getElementById("header").classList.remove("hidden");
    currentScreen = screenToGo;
    
    // Restaurar la pantalla en la que estábamos
    if (currentScreen === "dorsalSetup") {
        document.getElementById("dorsalSetup").classList.remove("hidden");
        updateList();
    } else if (currentScreen === "race") {
        document.getElementById("race").classList.remove("hidden");
        document.getElementById("header").innerText = `Tanda ${tanda} (${totalLaps} vueltas)`;
        interval = setInterval(updateTimer, 100);
        drawGrid();
    } else if (currentScreen === "results") {
        document.getElementById("results").classList.remove("hidden");
        renderResultsView();
    } else {
        document.getElementById("setup").classList.remove("hidden");
        document.getElementById("header").innerText = "Nueva Tanda";
    }
}

// --- FUNCIONES DEL PROGRAMA ---
function confirmTanda(){
    const t = document.getElementById("entryTanda").value;
    const l = document.getElementById("entryLaps").value;
    
    if(!t) { alert("Introduce un número de tanda"); return; }
    if(!l || parseInt(l) < 1) { alert("Introduce un número válido de vueltas"); return; }
    
    tanda = t;
    totalLaps = parseInt(l);
    currentScreen = "dorsalSetup";
    
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("dorsalSetup").classList.remove("hidden");
    updateList();
    saveData();
}

function addDorsal(){
    const input = document.getElementById("dorsalInput").value;
    if(!input) return;
    
    const nuevosDorsales = input.split(',')
                               .map(n => parseInt(n.trim()))
                               .filter(n => !isNaN(n));
    
    let agregados = [];
    nuevosDorsales.forEach(d => {
        if(!dorsals.includes(d)) {
            dorsals.push(d);
            agregados.push(d); 
        }
    });

    if(agregados.length > 0){
        setupHistory.push(agregados); 
        dorsals.sort((a,b)=>a-b);
        updateList();
        saveData();
    }
    document.getElementById("dorsalInput").value = "";
}

function removeLastDorsal(){
    if(setupHistory.length==0) return;
    const ultimosAgregados = setupHistory.pop();
    dorsals = dorsals.filter(d => !ultimosAgregados.includes(d));
    updateList();
    saveData();
}

function updateList(){
    const listDiv = document.getElementById("list");
    listDiv.innerText = dorsals.length > 0 ? "Dorsales: " + dorsals.join(", ") : "Sin dorsales añadidos";
}

function startRace(){
    if(dorsals.length==0) return;
    currentScreen = "race";
    document.getElementById("dorsalSetup").classList.add("hidden");
    document.getElementById("race").classList.remove("hidden");
    document.getElementById("header").innerText = `Tanda ${tanda} (${totalLaps} vueltas)`;
    
    activeRunners = dorsals.map(d => ({ id: d, laps: 0 }));
    historyRace = []; 
    
    startTime = Date.now();
    interval = setInterval(updateTimer, 100);
    drawGrid();
    saveData();
}

function updateTimer(){
    let t = Date.now()-startTime;
    let s = Math.floor(t/1000), m=Math.floor(s/60); s=s%60;
    document.getElementById("timer").innerText = String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function drawGrid(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    
    activeRunners.sort((a,b)=>a.id-b.id).forEach(runner => {
        const btn = document.createElement("button");
        btn.className = "dorsal";
        btn.innerText = runner.id;
        
        const color = "#2ecc71"; 
        const visualPortions = totalLaps - 1; 
        
        if (totalLaps === 1) {
            btn.style.background = "transparent";
            btn.style.color = color;
            btn.style.textShadow = "none";
        } else if (runner.laps === 0) {
            btn.style.background = color;
        } else if (runner.laps === visualPortions) {
            btn.style.background = "transparent";
            btn.style.color = color;
            btn.style.textShadow = "none";
        } else {
            const percentTransparent = (runner.laps / visualPortions) * 100;
            btn.style.background = `conic-gradient(from 270deg, transparent 0% ${percentTransparent}%, ${color} ${percentTransparent}% 100%)`;
        }
        
        btn.onclick = () => register(runner.id);
        grid.appendChild(btn);
    });
}

function register(dId){
    if(window.navigator.vibrate) window.navigator.vibrate(50);
    
    let runner = activeRunners.find(r => r.id === dId);
    
    if (runner.laps < totalLaps - 1) {
        runner.laps++;
        historyRace.push({ type: 'lap', id: dId });
    } else {
        let time = Date.now() - startTime;
        let resultObj = { pos: results.length + 1, dorsal: dId, time: time };
        results.push(resultObj);
        
        activeRunners = activeRunners.filter(r => r.id !== dId);
        historyRace.push({ type: 'finish', id: dId, result: resultObj });
    }
    drawGrid();
    saveData();
}

function undo(){
    if(historyRace.length == 0) return;
    
    const lastAction = historyRace.pop();
    
    if (lastAction.type === 'lap') {
        let runner = activeRunners.find(r => r.id === lastAction.id);
        if (runner) runner.laps--;
    } else if (lastAction.type === 'finish') {
        results.pop(); 
        activeRunners.push({ id: lastAction.id, laps: totalLaps - 1 }); 
    }
    drawGrid();
    saveData();
}

function finishRace(){
    clearInterval(interval);
    activeRunners.forEach(runner => {
        results.push({pos:"-", dorsal: runner.id, time:"RETIRADO"});
    });
    activeRunners = [];
    currentScreen = "results";
    
    document.getElementById("race").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");
    
    renderResultsView();
    saveData();
}

function format(ms){
    if(ms==="RETIRADO") return ms;
    let s=Math.floor(ms/1000), m=Math.floor(s/60); s=s%60;
    return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function renderResultsView(){
    document.getElementById("header").innerText = "Tanda Finalizada";
    const date = new Date().toLocaleDateString();
    document.getElementById("resultHeader").innerText = `Tanda ${tanda} - ${date}`;
    let html="";
    results.forEach(r=>{
        html+=`<tr><td>${r.pos}</td><td>${r.dorsal}</td><td>${format(r.time)}</td></tr>`;
    });
    document.getElementById("resultTable").innerHTML=html;
}

function sendEmail(){
    const date = new Date().toLocaleDateString();
    let text=`Resultados Tanda ${tanda} (${date})%0D%0A%0D%0A`;
    text+=`Posición - Dorsal - Tiempo%0D%0A`;
    results.forEach(r=>{
        text+=`${r.pos} - ${r.dorsal} - ${format(r.time)}%0D%0A`;
    });
    window.location.href="mailto:extremeramiguel@me.com?subject=Resultados Carrera Tanda "+tanda+"&body="+text;
}

function downloadCSV() {
    let csvContent = "\uFEFFPosición;Dorsal;Tiempo\n";
    results.forEach(r => {
        csvContent += `${r.pos};${r.dorsal};${format(r.time)}\n`;
    });
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `Resultados_Tanda_${tanda}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function newTanda(){
    localStorage.removeItem('cronosData'); 
    location.reload(); 
}
</script>
</body>
</html>
