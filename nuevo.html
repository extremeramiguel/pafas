<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronometraje</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cronos">

    <style>
        :root {
            --bg-color: #111;
            --accent-color: #2ecc71;
            --text-color: #fff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding-top: env(safe-area-inset-top);
            user-select: none; /* Evita que seleccionen el texto arrastrando el dedo/ratón */
            -webkit-touch-callout: none; /* Evita menús contextuales largos en iOS */
        }
        h2 { margin-top: 20px; }
        button {
            font-size: 22px;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 12px;
            border: none;
            background: #444;
            color: white;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px;
            padding: 10px;
        }
        .dorsal {
            border: 4px solid var(--accent-color);
            box-sizing: border-box;
            color: white;
            font-weight: bold;
            font-size: 32px;
            padding: 25px 10px;
            border-radius: 15px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
            transition: background 0.2s ease;
        }
        .hidden { display: none !important; }
        #timer {
            font-size: 65px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin: 30px 0;
            color: var(--accent-color);
        }
        input {
            font-size: 22px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #222;
            color: white;
            width: 80%;
            margin-bottom: 10px;
            outline: none;
        }
        table { width: 95%; margin: auto; border-collapse: collapse; font-size: 18px; }
        th { background: #333; padding: 12px; border: 1px solid #555; }
        td { padding: 12px; border: 1px solid #555; }
        .btn-main { background: #3498db; width: 85%; font-weight: bold; }
        .btn-success { background: #2ecc71; width: 85%; font-weight: bold; }
        .btn-danger { background: #e74c3c; }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }
        .login-title {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-title">PAFAS 2026</div>
    <input id="codigoInput" type="password" placeholder="Introduce el código" inputmode="numeric" style="text-align: center;" onkeyup="if(event.key === 'Enter') checkCode()">
    <button class="btn-main" onclick="checkCode()">Acceder</button>
</div>

<h2 id="header" class="hidden">Nueva Tanda</h2>

<div id="setup" class="hidden">
    <input id="entryTanda" type="number" placeholder="Nº de Tanda" inputmode="numeric">
    <input id="entryLaps" type="number" placeholder="Nº de Vueltas" inputmode="numeric" value="5">
    <br>
    <button class="btn-main" onclick="confirmTanda()">Confirmar Tanda</button>
</div>

<div id="dorsalSetup" class="hidden">
    <input id="dorsalInput" placeholder="Añadir (Ej: 1, 4, 12)" type="text" onkeyup="if(event.key === 'Enter') addDorsal()">
    <div style="display: flex; justify-content: center;">
        <button onclick="addDorsal()">Añadir</button>
        <button class="btn-danger" onclick="removeLastDorsal()">Borrar último</button>
    </div>
    <div id="list" style="margin: 20px; white-space: pre-wrap; font-size: 18px; color: #aaa;"></div>
    <button class="btn-main" onclick="startRace()">INICIAR SALIDA</button>
</div>

<div id="race" class="hidden">
    <div id="timer">00:00</div>
    <div id="grid" class="grid"></div>
    <div style="margin-top: 20px;">
        <button onclick="undo()">DESHACER</button>
        <button class="btn-danger" onclick="finishRace()">CERRAR TANDA</button>
    </div>
</div>

<div id="results" class="hidden">
    <h3 id="resultHeader"></h3>
    <table>
        <thead>
            <tr>
                <th>Posición</th>
                <th>Dorsal</th>
                <th>Tiempo</th>
            </tr>
        </thead>
        <tbody id="resultTable"></tbody>
    </table>
    <br>
    <button class="btn-main" onclick="sendEmail()">ENVIAR POR EMAIL</button>
    <button class="btn-success" onclick="downloadCSV()">DESCARGAR EXCEL</button>
    <button onclick="newTanda()" style="width: 85%;">Nueva tanda</button>
</div>
